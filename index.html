                } catch (e) { return defaultValue; }

                        <button onClick={onCancel} className="btn btn-secondary flex-1">取消</button>

        const StatCard = ({ title, value, subValue, icon: IconColor, colorClass }) => (
            <div className={`card p-6 border-l-4 ${colorClass}`}>
                <div className="flex justify-between items-start">
                    <div>
                        <div className="text-slate-400 text-sm font-bold mb-1 uppercase tracking-wide">{title}</div>
                        <div className="text-3xl font-black text-slate-800">{value}</div>
                        {subValue && <div className="text-sm text-slate-500 mt-1 font-medium">{subValue}</div>}
                    </div>
                    <div className={`p-3 rounded-xl bg-opacity-10 ${colorClass.replace('border-', 'bg-').replace('500', '100')}`}>
                        <IconColor className={`w-6 h-6 ${colorClass.replace('border-', 'text-')}`} />
                    </div>
                </div>
            </div>
        );

        // --- 6. App ---
        function HairSalonApp() {
            const [activeTab, setActiveTab] = useState('pos');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [notification, setNotification] = useState(null);

            // States (with fail-safe defaults)
            const [services, setServices] = useStickyState('salon_services', DEFAULT_SERVICES);
            const [stylists, setStylists] = useStickyState('salon_stylists', DEFAULT_STYLISTS);
            const [customers, setCustomers] = useStickyState('salon_customers', []);
            const [transactions, setTransactions] = useStickyState('salon_transactions', []);
            const [inventoryLogs, setInventoryLogs] = useStickyState('salon_inventory_logs', []);
            const [expenses, setExpenses] = useStickyState('salon_expenses', []);
            const [pendingOrders, setPendingOrders] = useStickyState('salon_pending_orders', []);
            const [settings, setSettings] = useStickyState('salon_settings', { 
                categories: DEFAULT_CATEGORIES, 
                expenseTypes: DEFAULT_EXPENSE_TYPES, 
                commissionRates: DEFAULT_COMMISSION,
                deductCostBeforeCommission: true,
                autoBackup: false,
                categoryColors: {},
                roleColors: {},
                genderColors: DEFAULT_GENDER_COLORS
            });

            // Fallback for missing settings if loading from old data
            const safeSettings = {
                categories: settings.categories || DEFAULT_CATEGORIES,
                expenseTypes: settings.expenseTypes || DEFAULT_EXPENSE_TYPES,
                commissionRates: settings.commissionRates || DEFAULT_COMMISSION,
                deductCostBeforeCommission: settings.deductCostBeforeCommission ?? true,
                autoBackup: settings.autoBackup ?? false,
                categoryColors: settings.categoryColors || {},
                roleColors: settings.roleColors || {},
                genderColors: settings.genderColors || DEFAULT_GENDER_COLORS
            };

            // Global Safe Data Accessors (Data Guards)
            const safeServices = Array.isArray(services) ? services : [];
            const safeStylists = Array.isArray(stylists) ? stylists : [];
            const safeCustomers = Array.isArray(customers) ? customers : [];
            const safeTransactions = Array.isArray(transactions) ? transactions : [];
            const safeInventoryLogs = Array.isArray(inventoryLogs) ? inventoryLogs : [];
            const safeExpenses = Array.isArray(expenses) ? expenses : [];
            const safePendingOrders = Array.isArray(pendingOrders) ? pendingOrders : [];

            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

            const confirmAction = (title, message, action) => {
                setConfirmDialog({ isOpen: true, title, message, onConfirm: async () => { await action(); setConfirmDialog(prev => ({ ...prev, isOpen: false })); }, onCancel: () => setConfirmDialog(prev => ({ ...prev, isOpen: false })) });
            };

            const showToast = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            // Helper to get color classes based on settings
            const getThemeClasses = (key, type) => {
                const themeKey = key || 'slate'; // default
                const theme = COLOR_THEMES[themeKey] || COLOR_THEMES['slate'];
                if (type === 'card') return `${theme.bg} ${theme.border} ${theme.hover}`;
                if (type === 'card_filled') return `${theme.card_filled}`;
                if (type === 'badge') return theme.badge;
                if (type === 'accent') return `${theme.accent} bg-white`;
                if (type === 'fill') return theme.fill; // for charts
                return '';
            };

            // --- Views ---

            // [查單管理系統] (v18.0)
            const OrderView = () => {
                const [searchTerm, setSearchTerm] = useState('');
                const [dateMode, setDateMode] = useState('month');
                const [queryDate, setQueryDate] = useState(getCurrentDateLocal().slice(0, 7));
                const [editingOrder, setEditingOrder] = useState(null);
                const [filterStylist, setFilterStylist] = useState('all');

                const handleModeChange = (mode) => {
                    setDateMode(mode);
                    if (mode === 'month') {
                        setQueryDate(getCurrentDateLocal().slice(0, 7));
                    } else {
                        setQueryDate(getCurrentDateLocal());
                    }
                };

                const filteredOrders = useMemo(() => {
                    return safeTransactions.filter(t => {
                        const txDate = t.date ? t.date.substring(0, 10) : '';
                        let matchDate = true;
                        if (dateMode === 'month') matchDate = txDate.startsWith(queryDate);
                        else matchDate = txDate === queryDate;

                        const matchSearch = searchTerm ? ((t.customerName && t.customerName.includes(searchTerm)) || (t.id && t.id.includes(searchTerm))) : true;
                        const matchStylist = filterStylist === 'all' || t.mainStylistId === filterStylist;

                        return matchDate && matchSearch && matchStylist;
                    }).sort((a,b) => new Date(b.date) - new Date(a.date));
                }, [safeTransactions, queryDate, searchTerm, dateMode, filterStylist]);

                const handleDeleteOrder = (orderId) => {
                    confirmAction('刪除訂單', '確定要刪除此筆訂單？此動作將扣回顧客累積消費與次數，但不會回補庫存。', () => {
                        const order = safeTransactions.find(t => t.id === orderId);
                        if (order && order.customerId) {
                            const updatedCustomers = safeCustomers.map(c => {
                                if (c.id === order.customerId) {
                                    return { 
                                        ...c, 
                                        visits: Math.max(0, (c.visits || 1) - 1), 
                                        totalSpend: Math.max(0, (c.totalSpend || order.total) - order.total) 
                                    };
                                }
                                return c;
                            });
                            setCustomers(updatedCustomers);
                        }
                        setTransactions(safeTransactions.filter(t => t.id !== orderId));
                        showToast('訂單已刪除');
                    });
                };

                const handleUpdateOrder = (updatedOrder) => {
                    const newTransactions = safeTransactions.map(t => t.id === updatedOrder.id ? updatedOrder : t);
                    setTransactions(newTransactions);

                    const oldOrder = safeTransactions.find(t => t.id === updatedOrder.id);
                    if (oldOrder && oldOrder.customerId && oldOrder.total !== updatedOrder.total) {
                        const diff = updatedOrder.total - oldOrder.total;
                        const updatedCustomers = safeCustomers.map(c => {
                            if (c.id === oldOrder.customerId) {
                                return { ...c, totalSpend: (c.totalSpend || 0) + diff };
                            }
                            return c;
                        });
                        setCustomers(updatedCustomers);
                    }
                    
                    setEditingOrder(null);
                    showToast('訂單已修正');
                };

                // Edit Modal Inner Component
                const EditOrderModal = ({ order, onClose, onSave }) => {
                    const [form, setForm] = useState(JSON.parse(JSON.stringify(order))); 
                    
                    const updateItem = (idx, field, value) => {
                        const newItems = [...form.items];
                        newItems[idx][field] = value;
                        const newTotal = newItems.reduce((sum, item) => sum + (Number(item.price) - (Number(item.discount)||0)), 0);
                        setForm({ ...form, items: newItems, total: newTotal });
                    };

                    const deleteItem = (idx) => {
                        const newItems = form.items.filter((_, i) => i !== idx);
                        const newTotal = newItems.reduce((sum, item) => sum + (Number(item.price) - (Number(item.discount)||0)), 0);
                        setForm({ ...form, items: newItems, total: newTotal });
                    };

                    const handleConvertToMember = () => {
                        const inputName = prompt('請輸入新會員姓名：', form.customerName || '');
                        if (!inputName) return;
                        const inputPhone = prompt(`請輸入 ${inputName} 的電話號碼：`);
                        if (!inputPhone) return;

                        const newId = generateId();
                        const newCustomer = {
                            id: newId, name: inputName, phone: inputPhone,
                            notes: '由查單介面轉入', visits: 1, totalSpend: form.total, tags: []
                        };
                        
                        setCustomers([...safeCustomers, newCustomer]);
                        setForm({ ...form, customerId: newId, customerName: inputName });
                        showToast(`已成功建立會員：${newCustomer.name}`);
                    };

                    return (
                        <Modal title={`編輯訂單 #${order.id.slice(0,8)}`} onClose={onClose} size="max-w-2xl">
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border">
                                    <div><label className="text-xs font-bold text-slate-500">日期</label><input type="datetime-local" className="input-field" value={form.date.slice(0,16)} onChange={e=>setForm({...form, date: new Date(e.target.value).toISOString()})}/></div>
                                    <div><label className="text-xs font-bold text-slate-500">付款方式</label><select className="input-field" value={form.paymentMethod} onChange={e=>setForm({...form, paymentMethod: e.target.value})}>{['現金', '信用卡', '街口支付', 'LINE Pay'].map(m=><option key={m} value={m}>{m}</option>)}</select></div>
                                    <div><label className="text-xs font-bold text-slate-500">主設計師</label><select className="input-field" value={form.mainStylistId} onChange={e=>setForm({...form, mainStylistId: e.target.value})}>{safeStylists.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <label className="text-xs font-bold text-slate-500">顧客姓名 {form.customerId ? '(會員)' : '(散客)'}</label>
                                            {!form.customerId && (<button onClick={handleConvertToMember} className="text-[10px] bg-indigo-600 text-white px-2 py-0.5 rounded hover:bg-indigo-700 transition-colors flex items-center gap-1"><UserPlus size={10}/> 轉為會員</button>)}
                                        </div>
                                        <input type="text" className={`input-field ${form.customerId ? 'bg-indigo-50 text-indigo-700 font-bold opacity-70 cursor-not-allowed' : ''}`} value={form.customerName || ''} onChange={e => setForm({...form, customerName: e.target.value})} disabled={!!form.customerId} placeholder="輸入散客姓名"/>
                                    </div>
                                </div>
                                <div className="border-t pt-4">
                                    <h4 className="font-bold mb-2">訂單項目</h4>
                                    <div className="space-y-2">
                                        {form.items.map((item, idx) => (
                                            <div key={idx} className="flex items-center gap-2 p-2 border rounded-lg hover:bg-slate-50">
                                                <div className="flex-1"><div className="font-bold text-sm">{item.name}</div><div className="text-xs text-slate-500">{item.category}</div></div>
                                                <div className="w-24"><label className="text-[10px] block text-slate-400">售價</label><input type="number" className="input-field py-1 px-2 text-sm" value={item.price} onChange={e=>updateItem(idx, 'price', Number(e.target.value))}/></div>
                                                <div className="w-20"><label className="text-[10px] block text-slate-400">折扣</label><input type="number" className="input-field py-1 px-2 text-sm text-red-500" value={item.discount||0} onChange={e=>updateItem(idx, 'discount', Number(e.target.value))}/></div>
                                                <button onClick={()=>deleteItem(idx)} className="text-slate-400 hover:text-red-500 p-2"><Trash2 size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="border-t pt-4 flex justify-between items-center"><div className="text-xl font-black text-slate-800">總計: {formatCurrency(form.total)}</div><div className="flex gap-2"><button onClick={onClose} className="btn btn-secondary">取消</button><button onClick={()=>onSave(form)} className="btn btn-primary">儲存修正</button></div></div>
                            </div>
                        </Modal>
                    );
                };

                return (
                    <div className="p-6 h-full overflow-y-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><ClipboardList className="text-indigo-500"/> 查單管理系統</h2>
                            
                            <div className="flex gap-2 items-center flex-wrap md:flex-nowrap">
                                <div className="flex gap-1 bg-white p-1 rounded-lg border border-slate-300">
                                    <button onClick={() => handleModeChange('month')} className={`px-3 py-1 text-sm rounded-md transition-colors ${dateMode==='month' ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>月</button>
                                    <button onClick={() => handleModeChange('date')} className={`px-3 py-1 text-sm rounded-md transition-colors ${dateMode==='date' ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>日</button>
                                </div>
                                <input type={dateMode} className="input-field w-auto font-bold" value={queryDate} onChange={e=>setQueryDate(e.target.value)}/>
                                <select className="input-field w-32 font-bold" value={filterStylist} onChange={(e) => setFilterStylist(e.target.value)}>
                                    <option value="all">全體人員</option>
                                    {safeStylists.map(s => (<option key={s.id} value={s.id}>{s.name}</option>))}
                                </select>
                                <div className="relative"><Search className="absolute left-3 top-3 text-slate-400" size={18}/><input className="input-field pl-10" placeholder="搜尋..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/></div>
                            </div>
                        </div>

                        {/* 卡片式列表區域 */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                            {filteredOrders.map(t => {
                                const customer = safeCustomers.find(c => c.id === t.customerId);
                                const gender = customer?.gender || '女'; 
                                const isVip = (customer?.totalSpend || 0) > 10000;

                                // 讀取自訂顏色
                                const themeKey = safeSettings.genderColors[gender] || 'slate';
                                const cardClass = getThemeClasses(themeKey, 'card_filled');

                                return (
                                    <div key={t.id} className={`card p-5 relative group transition-all border border-transparent hover:border-slate-300 ${cardClass}`}>
                                        {/* 卡片標頭 */}
                                        <div className="flex justify-between items-start mb-3 border-b border-black/5 pb-2">
                                            <div>
                                                <div className="text-sm font-bold text-slate-800">{new Date(t.date).toLocaleDateString()}</div>
                                                <div className="text-xs text-slate-500 font-mono">{new Date(t.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-xs text-slate-400 font-mono">#{t.id.slice(0,6)}</div>
                                                {isVip && <span className="text-sm" title="VIP客戶">👑</span>}
                                            </div>
                                        </div>

                                        {/* 卡片主體 */}
                                        <div className="flex justify-between items-center mb-3">
                                            <div>
                                                <div className="font-black text-lg text-slate-900 flex items-center gap-1">
                                                    {t.customerName}
                                                    <span className="text-[10px] bg-white/50 px-1.5 rounded text-slate-600 border border-slate-200">{gender}</span>
                                                </div>
                                                <div className="text-xs text-slate-600 flex items-center gap-1">
                                                    <User size={10}/> {safeStylists.find(s=>s.id===t.mainStylistId)?.name || '未指定'}
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="font-black text-xl text-slate-800">{formatCurrency(t.total)}</div>
                                                <span className="text-[10px] bg-white/80 px-1.5 py-0.5 rounded text-slate-600 border border-slate-200">{t.paymentMethod}</span>
                                            </div>
                                        </div>

                                        {/* 服務標籤 (套用分類顏色) */}
                                        <div className="flex flex-wrap gap-1 mb-1">
                                            {(t.items||[]).map((i, idx) => {
                                                const catThemeKey = safeSettings.categoryColors[i.category] || 'slate';
                                                const catBadgeClass = getThemeClasses(catThemeKey, 'badge');
                                                return (
                                                    <span key={idx} className={`text-[10px] px-2 py-1 rounded font-bold border border-black/5 ${catBadgeClass}`}>
                                                        {i.name}
                                                    </span>
                                                );
                                            })}
                                        </div>

                                        {/* 懸浮按鈕 */}
                                        <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity bg-white/90 p-1.5 rounded-lg shadow-sm backdrop-blur-sm border border-slate-100">
                                            <button onClick={()=>setEditingOrder(t)} className="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-all" title="編輯"><Edit size={16}/></button>
                                            <button onClick={()=>handleDeleteOrder(t.id)} className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="刪除"><Trash2 size={16}/></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {filteredOrders.length === 0 && (
                            <div className="text-center py-20 bg-white rounded-xl border border-dashed text-slate-400 flex flex-col items-center gap-2">
                                <ClipboardList size={40} className="opacity-20"/>
                                <span>查無訂單資料</span>
                            </div>
                        )}

                        {editingOrder && <EditOrderModal order={editingOrder} onClose={()=>setEditingOrder(null)} onSave={handleUpdateOrder}/>}
                    </div>
                );
            };

            // --- Report View ---
            const ReportView = () => {
                const [view, setView] = useState('dashboard');
                const [reportMode, setReportMode] = useState('month'); 
                const [queryDate, setQueryDate] = useState(getCurrentDateLocal().slice(0, 7)); // Default YYYY-MM
                const [newExpense, setNewExpense] = useState({ date: getCurrentDateLocal(), type: '雜支', amount: '', note: '', staffId: '' });
                const [showExpenseModal, setShowExpenseModal] = useState(false);

                const handleModeChange = (mode) => {
                    setReportMode(mode);
                    const now = getCurrentDateLocal();
                    if (mode === 'day') setQueryDate(now);
                    else if (mode === 'month') setQueryDate(now.slice(0, 7));
                    else if (mode === 'year') setQueryDate(now.slice(0, 4));
                };

                const reportTx = useMemo(() => {
                    return safeTransactions.filter(t => {
                        if (!t.date) return false;
                        const d = t.date;
                        if (reportMode === 'day') return d.startsWith(queryDate);
                        if (reportMode === 'month') return d.startsWith(queryDate);
                        if (reportMode === 'year') return d.startsWith(queryDate);
                        return false;
                    });
                }, [safeTransactions, queryDate, reportMode]);

                const reportExp = useMemo(() => {
                    return safeExpenses.filter(e => {
                        if (!e.date) return false;
                        if (reportMode === 'day') return e.date === queryDate;
                        if (reportMode === 'month') return e.date.startsWith(queryDate);
                        if (reportMode === 'year') return e.date.startsWith(queryDate);
                        return false;
                    });
                }, [safeExpenses, queryDate, reportMode]);

                const totalRevenue = reportTx.reduce((sum, t) => sum + (Number(t.total) || 0), 0);
                const totalExpense = reportExp.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
                const netProfit = totalRevenue - totalExpense;
                const totalOrders = reportTx.length;
                const avgOrderValue = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

                const paymentMethodStats = useMemo(() => {
                    const stats = {};
                    reportTx.forEach(t => {
                        const method = t.paymentMethod || '其他';
                        if (!stats[method]) stats[method] = 0;
                        stats[method] += t.total;
                    });
                    return stats;
                }, [reportTx]);

                const salaryReport = useMemo(() => {
                    return safeStylists.map(s => {
                        let serviceRevenue = 0, productRevenue = 0, serviceCommission = 0, productCommission = 0;
                        reportTx.forEach(t => {
                            (t.items || []).forEach(item => {
                                if (item.stylistId === s.id) {
                                    const amount = (Number(item.price) || 0) - (Number(item.discount) || 0);
                                    const cost = Number(item.cost) || 0;
                                    const base = safeSettings.deductCostBeforeCommission ? (amount - cost) : amount;
                                    let rate = s.useGlobalCommission ? (safeSettings.commissionRates[item.category] || 0) : (s.commissionRate || 0);
                                    const comm = Math.round(base * (rate / 100));
                                    if (item.isProduct) { productRevenue += amount; productCommission += comm; } 
                                    else { serviceRevenue += amount; serviceCommission += comm; }
                                }
                            });
                        });

                    setExpenses([...safeExpenses, { id: generateId(), ...newExpense }]);

                    <div className="p-4 md:p-8 h-full overflow-y-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <div className="flex bg-white p-1.5 rounded-xl shadow-sm border border-slate-200">
                                {[{id:'dashboard', icon:Activity, label:'營運儀表'}, {id:'salary', icon:User, label:'人員薪資'}, {id:'expense', icon:DollarSign, label:'支出管理'}].map(tab => (
                                    <button key={tab.id} onClick={()=>setView(tab.id)} className={`px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all ${view===tab.id ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                                        <tab.icon size={18}/> {tab.label}
                                    </button>
                                ))}
                            </div>
                            <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex gap-1 border-r pr-3 mr-2">
                                    <button onClick={()=>handleModeChange('day')} className={`px-2 py-1 text-xs rounded font-bold ${reportMode==='day'?'bg-indigo-100 text-indigo-600':'text-slate-400 hover:text-slate-600'}`}>日報</button>
                                    <button onClick={()=>handleModeChange('month')} className={`px-2 py-1 text-xs rounded font-bold ${reportMode==='month'?'bg-indigo-100 text-indigo-600':'text-slate-400 hover:text-slate-600'}`}>月報</button>
                                    <button onClick={()=>handleModeChange('year')} className={`px-2 py-1 text-xs rounded font-bold ${reportMode==='year'?'bg-indigo-100 text-indigo-600':'text-slate-400 hover:text-slate-600'}`}>年報</button>
                                </div>
                                <span className="text-slate-400 font-bold text-sm">查詢時間</span>
                                {reportMode === 'day' && <input type="date" className="bg-transparent font-bold text-slate-700 outline-none w-32" value={queryDate} onChange={e=>setQueryDate(e.target.value)}/>}
                                {reportMode === 'month' && <input type="month" className="bg-transparent font-bold text-slate-700 outline-none" value={queryDate} onChange={e=>setQueryDate(e.target.value)}/>}
                                {reportMode === 'year' && <input type="number" min="2020" max="2050" className="bg-transparent font-bold text-slate-700 outline-none w-20" value={queryDate} onChange={e=>setQueryDate(e.target.value)}/>}
                            </div>
                        </div>

                        {view === 'dashboard' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard title={`${reportMode==='year'?'本年':reportMode==='month'?'本月':'本日'}總營收`} value={formatCurrency(totalRevenue)} icon={TrendingUp} colorClass="border-indigo-500" />
                                    <StatCard title={`${reportMode==='year'?'本年':reportMode==='month'?'本月':'本日'}總支出`} value={formatCurrency(totalExpense)} icon={Wallet} colorClass="border-rose-500" />
                                    <StatCard title="淨利 (Net Profit)" value={formatCurrency(netProfit)} subValue={`淨利率: ${totalRevenue>0?((netProfit/totalRevenue)*100).toFixed(1):0}%`} icon={DollarSign} colorClass={netProfit>=0?"border-emerald-500":"border-red-500"} />
                                    <StatCard title="總來客數 (單)" value={totalOrders} subValue={`平均客單: ${formatCurrency(avgOrderValue)}`} icon={User} colorClass="border-amber-500" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="card p-6">
                                        <h3 className="font-bold text-lg mb-6 text-slate-800 flex items-center gap-2"><Scissors size={20} className="text-indigo-500"/> 服務項目營收佔比</h3>
                                        <div className="space-y-5">
                                            {safeSettings.categories.map(cat => {
                                                const catTotal = reportTx.reduce((sum, t) => sum + (t.items||[]).filter(i=>i.category===cat).reduce((s,i)=>s+(i.price-(i.discount||0)),0), 0);
                                                const percent = totalRevenue > 0 ? (catTotal / totalRevenue) * 100 : 0;
                                                if (percent === 0) return null;
                                                
                                                // 使用自訂顏色
                                                const themeKey = safeSettings.categoryColors[cat] || 'slate';
                                                const fillColor = getThemeClasses(themeKey, 'fill') || '#6366f1';

                                                return (<div key={cat}><div className="flex justify-between text-sm mb-2 font-bold text-slate-600"><span>{cat}</span><span>{formatCurrency(catTotal)} ({percent.toFixed(1)}%)</span></div><div className="bar-container"><div className="bar-fill" style={{width: `${percent}%`, backgroundColor: fillColor}}></div></div></div>);
                                            })}
                                        </div>
                                    </div>
                                    <div className="card p-6">
                                        <h3 className="font-bold text-lg mb-6 text-slate-800 flex items-center gap-2"><CreditCard size={20} className="text-emerald-500"/> 收款方式分析</h3>
                                        <div className="space-y-5">
                                            {Object.entries(paymentMethodStats).map(([method, amount]) => {
                                                const percent = totalRevenue > 0 ? (amount / totalRevenue) * 100 : 0;
                                                return (<div key={method}><div className="flex justify-between text-sm mb-2 font-bold text-slate-600"><span className="flex items-center gap-2">{method}</span><span>{formatCurrency(amount)} ({percent.toFixed(1)}%)</span></div><div className="bar-container"><div className="bar-fill bg-emerald-500" style={{width: `${percent}%`}}></div></div></div>);
                                            })}
                                            {Object.keys(paymentMethodStats).length === 0 && <div className="text-center text-slate-400 py-10">尚無收款紀錄</div>}
                                        </div>
                                    </div>
                                    <div className="card p-6">
                                        <h3 className="font-bold text-lg mb-6 text-slate-800 flex items-center gap-2"><Briefcase size={20} className="text-rose-500"/> 支出結構分析</h3>
                                        <div className="space-y-5">
                                            {safeSettings.expenseTypes.map(type => {

                                                return (<div key={type}><div className="flex justify-between text-sm mb-2 font-bold text-slate-600"><span>{type}</span><span>{formatCurrency(typeTotal)} ({percent.toFixed(1)}%)</span></div><div className="bar-container"><div className="bar-fill bg-rose-500" style={{width: `${percent}%`}}></div></div></div>);
                                            })}
                                            {reportExp.length === 0 && <div className="text-center text-slate-400 py-10">尚無支出紀錄</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'salary' && (
                            <div className="space-y-8 animate-fade-in">

                                </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm whitespace-nowrap">
                                            <thead className="bg-white border-b border-slate-200 text-slate-500 uppercase tracking-wider font-bold">
                                                <tr><th className="p-4 sticky left-0 bg-white min-w-[120px]">設計師</th>{safeSettings.categories.map(c => <th key={c} className="p-4 text-center">{c}</th>)}<th className="p-4 text-center font-black bg-indigo-50/30">總客次</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {categoryCountReport.map(s => (<tr key={s.id} className="hover:bg-slate-50 transition-colors"><td className="p-4 font-bold text-slate-800 sticky left-0 bg-white border-r">{s.name}</td>{safeSettings.categories.map(c => (<td key={c} className="p-4 text-center text-slate-600">{s.counts[c] > 0 ? <span className="bg-slate-100 px-2 py-1 rounded font-bold">{s.counts[c]}</span> : '-'}</td>))}<td className="p-4 text-center font-black text-indigo-600 bg-indigo-50/30">{s.totalCount}</td></tr>))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'expense' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
                                    <div className="font-bold text-slate-500">{reportMode==='year'?'本年':reportMode==='month'?'本月':'本日'}支出總計: <span className="text-2xl text-slate-800 ml-2">{formatCurrency(totalExpense)}</span></div>
                                    <button onClick={()=>setShowExpenseModal(true)} className="btn btn-primary"><Plus size={18}/> 新增支出</button>
                                </div>
                                <div className="card overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 border-b"><tr><th className="p-4">日期</th><th className="p-4">項目</th><th className="p-4">說明</th><th className="p-4 text-right">金額</th><th className="p-4 text-center">操作</th></tr></thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {reportExp.map(e => (
                                                <tr key={e.id} className="hover:bg-slate-50">
                                                    <td className="p-4 text-slate-500 font-mono">{e.date}</td>
                                                    <td className="p-4 font-bold text-slate-700"><span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs ${e.type==='員工借支'?'bg-rose-100 text-rose-700':'bg-slate-100 text-slate-700'}`}>{e.type==='員工借支' && <Wallet size={12}/>} {e.type}</span></td>
                                                    <td className="p-4 text-slate-600">{e.note} {e.relatedStaffId && <span className="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded text-xs font-bold ml-1">{safeStylists.find(s=>s.id===e.relatedStaffId)?.name}</span>}</td>
                                                    <td className="p-4 text-right font-bold text-rose-600">{formatCurrency(e.amount)}</td>
                                                    <td className="p-4 text-center"><button onClick={()=>confirmAction('刪除支出', '確定刪除此筆紀錄？', ()=>setExpenses(safeExpenses.filter(x=>x.id!==e.id)))} className="text-slate-300 hover:text-rose-500 p-2 transition-colors"><Trash2 size={16}/></button></td>
                                                </tr>
                                            ))}
                                            {reportExp.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">尚無支出紀錄</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {showExpenseModal && (
                            <Modal title="新增支出紀錄" onClose={()=>setShowExpenseModal(false)}>
                                <div className="space-y-4">
                                    <input type="date" className="input-field" value={newExpense.date} onChange={e=>setNewExpense({...newExpense, date: e.target.value})}/>
                                    <div><label className="text-xs font-bold text-slate-500 mb-2 block">支出類別</label><div className="grid grid-cols-2 gap-2">{safeSettings.expenseTypes.map(t=>(<button key={t} onClick={()=>setNewExpense({...newExpense, type:t, staffId: t!=='員工借支'?'':newExpense.staffId})} className={`py-2.5 rounded-lg text-sm font-bold border transition-all ${newExpense.type===t?'bg-rose-500 text-white border-rose-500 shadow-md':'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>{t}</button>))}</div></div>
                                    <div><label className="text-xs font-bold text-slate-500 mb-1 block">金額</label><input type="number" className="input-field text-lg font-bold" placeholder="0" value={newExpense.amount} onChange={e=>setNewExpense({...newExpense, amount: e.target.value})}/></div>
                                    <div><label className="text-xs font-bold text-slate-500 mb-1 block">備註說明</label><input className="input-field" placeholder="例如: 購買飲料、預支薪水..." value={newExpense.note} onChange={e=>setNewExpense({...newExpense, note: e.target.value})}/></div>
                                    {newExpense.type === '員工借支' && (<div className="bg-rose-50 p-3 rounded-lg border border-rose-100"><label className="text-xs font-bold text-rose-600 mb-1 block flex items-center gap-1"><User size={12}/> 借支人員 (將從薪資扣除)</label><select className="input-field border-rose-200 focus:border-rose-500" value={newExpense.staffId} onChange={e=>setNewExpense({...newExpense, staffId: e.target.value})}><option value="">請選擇人員</option>{safeStylists.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>)}
                                    <button onClick={addExpense} className="btn btn-primary w-full py-3 mt-2 shadow-lg">確認新增支出</button>
                                </div>
                            </Modal>
                        )}
                    </div>
                );
            };

            // [Inventory View]
            const InventoryView = () => {
                const [mode, setMode] = useState('list');
                const [targetItem, setTargetItem] = useState(null);
                const [qty, setQty] = useState(1);
                const [cost, setCost] = useState(0);
                const [note, setNote] = useState('');
                const [adjustType, setAdjustType] = useState('inc');
                const [searchTerm, setSearchTerm] = useState(''); // 新增搜尋功能

                // 過濾商品 (只顯示產品類，並支援搜尋)
                const products = safeServices.filter(s => 
                    s.isProduct && (s.name.includes(searchTerm) || s.category.includes(searchTerm))
                );
                
                const handleInventoryAction = (actionType) => {
                    if(!targetItem || qty <= 0) return;
                    let newStock = targetItem.stock || 0;
                    let logType = '', finalNote = note;

                    if (actionType === 'restock') {
                        newStock += Number(qty); logType = '進貨';
                        setServices(safeServices.map(s => s.id === targetItem.id ? { ...s, stock: newStock, cost: Number(cost) > 0 ? Number(cost) : s.cost } : s));
                    } else if (actionType === 'internal') {
                        if(newStock < qty) { showToast('庫存不足', 'error'); return; }
                        newStock -= Number(qty); logType = '領用';
                        setServices(safeServices.map(s => s.id === targetItem.id ? { ...s, stock: newStock } : s));
                        setExpenses([...safeExpenses, { id: generateId(), date: new Date().toISOString(), type: '自領料(成本)', amount: targetItem.cost * qty, note: `領用: ${targetItem.name} x${qty}`, relatedStaffId: '' }]);
                    } else if (actionType === 'adjust') {
                        if (adjustType === 'inc') { newStock += Number(qty); logType = '盤點+'; } 
                        else { if(newStock < qty) { showToast('庫存不足', 'error'); return; } newStock -= Number(qty); logType = '盤點-'; }
                        setServices(safeServices.map(s => s.id === targetItem.id ? { ...s, stock: newStock } : s));
                        if (!finalNote) finalNote = adjustType === 'inc' ? '庫存修正(增)' : '庫存修正(減)';
                    }
                    setInventoryLogs([{ id: generateId(), date: new Date().toISOString(), type: logType, itemName: targetItem.name, qty: Number(qty), cost: actionType === 'restock' ? Number(cost) : 0, note: finalNote, operator: 'System' }, ...safeInventoryLogs]);
                    setTargetItem(null); setQty(1); setCost(0); setNote(''); showToast(`${logType}完成`);
                };

                return (
                    <div className="p-6 h-full overflow-y-auto">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                            <div className="flex gap-4">
                                <button onClick={()=>setMode('list')} className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${mode==='list'?'bg-slate-800 text-white shadow-lg':'bg-white text-slate-600'}`}><Box size={18}/> 庫存總覽</button>
                                <button onClick={()=>setMode('logs')} className={`px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all ${mode==='logs'?'bg-slate-800 text-white shadow-lg':'bg-white text-slate-600'}`}><Table size={18}/> 異動紀錄</button>
                            </div>
                            {/* 庫存頁面專用的搜尋框 */}
                            {mode === 'list' && (
                                <div className="relative w-full md:w-64">
                                    <Search className="absolute left-3 top-2.5 text-slate-400" size={18}/>
                                    <input className="input-field pl-10 py-2" placeholder="搜尋商品..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                                </div>
                            )}
                        </div>

                        {/* 卡片模式 (v18.0: 使用分類顏色標籤) */}
                        {mode === 'list' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                {products.map(p => {
                                    const isLowStock = p.stock <= 5; 
                                    const themeKey = safeSettings.categoryColors[p.category] || 'slate';
                                    const badgeClass = getThemeClasses(themeKey, 'badge');

                                    return (
                                        <div key={p.id} className={`card p-5 relative group border-l-4 transition-all ${isLowStock ? 'border-l-red-500 bg-red-50/30' : 'border-l-emerald-500 hover:border-l-emerald-600'}`}>
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded font-bold mb-1 inline-block ${badgeClass}`}>{p.category}</span>
                                                    <h3 className="font-bold text-lg text-slate-800">{p.name}</h3>
                                                </div>
                                                <div className="text-right">
                                                    <div className={`text-2xl font-black ${isLowStock ? 'text-red-600' : 'text-emerald-600'}`}>{p.stock}</div>
                                                    <div className="text-[10px] text-slate-400">庫存數量</div>
                                                </div>
                                            </div>
                                            
                                            <div className="flex justify-between items-center text-sm text-slate-500 mb-4 bg-white/50 p-2 rounded-lg">
                                                <span>成本單價:</span>
                                                <span className="font-mono font-bold">${p.cost}</span>
                                            </div>

                                            {/* 操作按鈕區 */}
                                            <div className="grid grid-cols-3 gap-2">
                                                <button onClick={()=>{setTargetItem(p); setMode('restock'); setCost(p.cost);}} className="flex flex-col items-center justify-center py-2 rounded-lg bg-white border border-emerald-100 hover:bg-emerald-50 text-emerald-600 transition-colors">
                                                    <Truck size={16} className="mb-1"/>
                                                    <span className="text-[10px] font-bold">進貨</span>
                                                </button>
                                                <button onClick={()=>{setTargetItem(p); setMode('internal');}} className="flex flex-col items-center justify-center py-2 rounded-lg bg-white border border-orange-100 hover:bg-orange-50 text-orange-600 transition-colors">
                                                    <Hand size={16} className="mb-1"/>
                                                    <span className="text-[10px] font-bold">領用</span>
                                                </button>
                                                <button onClick={()=>{setTargetItem(p); setMode('adjust'); setAdjustType('inc');}} className="flex flex-col items-center justify-center py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-100 text-slate-600 transition-colors">
                                                    <RefreshCw size={16} className="mb-1"/>
                                                    <span className="text-[10px] font-bold">盤點</span>
                                                </button>
                                            </div>

                                            {isLowStock && (
                                                <div className="absolute top-2 right-2 flex h-3 w-3">
                                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                                    <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                                {products.length === 0 && (

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div><h4 className="text-sm font-bold text-slate-500 mb-3 border-b pb-2">顧客性別標示顏色 (男/女/兒童)</h4><div className="space-y-3">{Object.keys(safeSettings.genderColors).map(gender => (<div key={gender} className="flex justify-between items-center"><span className="font-bold text-slate-700">{gender}</span><select className="input-field w-40 text-xs font-bold" value={safeSettings.genderColors[gender] || 'slate'} onChange={e => setSettings({...safeSettings, genderColors: {...safeSettings.genderColors, [gender]: e.target.value}})}>{Object.keys(COLOR_THEMES).map(k => <option key={k} value={k}>{COLOR_THEMES[k].label}</option>)}</select></div>))}</div></div>
                                <div><h4 className="text-sm font-bold text-slate-500 mb-3 border-b pb-2">人員職位標示顏色</h4><div className="space-y-3">{allRoles.filter((v,i,a)=>a.indexOf(v)===i).map(role => (<div key={role} className="flex justify-between items-center"><span className="font-bold text-slate-700">{role}</span><select className="input-field w-40 text-xs font-bold" value={safeSettings.roleColors[role] || 'slate'} onChange={e => setSettings({...safeSettings, roleColors: {...safeSettings.roleColors, [role]: e.target.value}})}>{Object.keys(COLOR_THEMES).map(k => <option key={k} value={k}>{COLOR_THEMES[k].label}</option>)}</select></div>))}</div></div>
                                <div className="md:col-span-2"><h4 className="text-sm font-bold text-slate-500 mb-3 border-b pb-2">服務分類卡片顏色</h4><div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3">{safeSettings.categories.map(cat => (<div key={cat} className="flex justify-between items-center"><span className="font-bold text-slate-700">{cat}</span><select className="input-field w-40 text-xs font-bold" value={safeSettings.categoryColors[cat] || 'slate'} onChange={e => setSettings({...safeSettings, categoryColors: {...safeSettings.categoryColors, [cat]: e.target.value}})}>{Object.keys(COLOR_THEMES).map(k => <option key={k} value={k}>{COLOR_THEMES[k].label}</option>)}</select></div>))}</div></div>
                            </div>
                        </div>
                        <div className="card p-8">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4"><div><h3 className="font-bold text-xl text-slate-800 flex items-center gap-2"><Tag size={24} className="text-indigo-500"/> 價目表與商品管理</h3><p className="text-sm text-slate-500 mt-1">設定服務項目、價格、成本與庫存商品</p></div><div className="flex gap-2 w-full md:w-auto"><div className="relative flex-1 md:w-64"><Search className="absolute left-3 top-2.5 text-slate-400" size={18}/><input className="input-field pl-10 py-2" placeholder="搜尋項目..." value={itemSearch} onChange={e=>setItemSearch(e.target.value)}/></div><button onClick={()=>{setItemForm({category: safeSettings.categories[0], isProduct: false, price: 0, cost: 0}); setIsEditingItem(true);}} className="btn btn-primary whitespace-nowrap"><Plus size={18}/> 新增項目</button></div></div>
                            <div className="overflow-x-auto border rounded-xl"><table className="w-full text-left text-sm whitespace-nowrap"><thead className="bg-slate-50 border-b font-bold text-slate-600"><tr><th className="p-4">類別</th><th className="p-4">名稱</th><th className="p-4 text-right">售價</th><th className="p-4 text-right">成本</th><th className="p-4 text-center">庫存管理</th><th className="p-4 text-center">操作</th></tr></thead><tbody className="divide-y divide-slate-100">{filteredServices.map(s => (<tr key={s.id} className="hover:bg-slate-50"><td className="p-4"><span className="bg-slate-100 px-2 py-1 rounded text-xs font-bold text-slate-600">{s.category}</span></td><td className="p-4 font-bold text-slate-700">{s.name}</td><td className="p-4 text-right font-bold text-indigo-600">{formatCurrency(s.price)}</td><td className="p-4 text-right text-slate-500">{s.cost>0?formatCurrency(s.cost):'-'}</td><td className="p-4 text-center">{s.isProduct?<span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-bold">已啟用 (存: {s.stock})</span>:<span className="text-xs text-slate-400">-</span>}</td><td className="p-4 text-center flex justify-center gap-2"><button onClick={()=>{setItemForm(s); setIsEditingItem(true);}} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded"><Edit size={16}/></button><button onClick={()=>handleDeleteItem(s.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded"><Trash2 size={16}/></button></td></tr>))}{filteredServices.length === 0 && <tr><td colSpan="6" className="p-8 text-center text-slate-400">無符合項目</td></tr>}</tbody></table></div>
                        </div>
                        <div className="grid grid-cols-1 gap-8">
                            <div className="card p-8"><h3 className="font-bold text-xl mb-6 text-slate-800">抽成規則</h3><label className="flex items-center gap-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200 cursor-pointer"><input type="checkbox" checked={safeSettings.deductCostBeforeCommission} onChange={e=>setSettings({...safeSettings, deductCostBeforeCommission:e.target.checked})} className="w-5 h-5 accent-indigo-600"/> <span className="font-bold text-slate-700">計算抽成前，先扣除商品或服務成本 (毛利抽成)</span></label><h4 className="text-sm font-bold text-slate-500 mb-3">各分類預設抽成率 (%)</h4><div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">{safeSettings.categories.map(c=>(<div key={c} className="p-4 bg-slate-50 rounded-xl border border-slate-200"><div className="text-xs font-bold text-slate-400 mb-2">{c}</div><input type="number" className="w-full bg-transparent font-black text-xl border-b border-slate-300 focus:border-indigo-500 outline-none text-center" value={safeSettings.commissionRates[c]||0} onChange={e=>{const newRates={...safeSettings.commissionRates,[c]:Number(e.target.value)}; setSettings({...safeSettings, commissionRates:newRates})}}/></div>))}</div></div>
                            <div className="card p-8"><h3 className="font-bold text-xl mb-6 text-slate-800">分類管理</h3><div className="grid grid-cols-1 md:grid-cols-2 gap-8"><div><h4 className="text-sm font-bold text-slate-500 mb-3">服務/商品分類</h4><div className="flex gap-3 mb-4"><input className="input-field" placeholder="新分類名稱" value={categoryInput} onChange={e=>setCategoryInput(e.target.value)}/><button onClick={addCategory} className="btn btn-secondary">新增</button></div><div className="flex flex-wrap gap-2">{safeSettings.categories.map(c=>(<span key={c} className="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 border border-slate-200">{c} <button onClick={()=>removeCategory(c)} className="text-slate-400 hover:text-red-500 transition-colors"><X size={14}/></button></span>))}</div></div><div><h4 className="text-sm font-bold text-slate-500 mb-3">支出項目分類</h4><div className="flex gap-3 mb-4"><input className="input-field" placeholder="新支出項目" value={expenseTypeInput} onChange={e=>setExpenseTypeInput(e.target.value)}/><button onClick={addExpenseType} className="btn btn-secondary">新增</button></div><div className="flex flex-wrap gap-2">{safeSettings.expenseTypes.map(t=>(<span key={t} className="bg-slate-100 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 border border-slate-200">{t} <button onClick={()=>removeExpenseType(t)} className="text-slate-400 hover:text-red-500 transition-colors"><X size={14}/></button></span>))}</div></div></div></div>
                            <div className="card p-8"><h3 className="font-bold text-xl mb-6 text-slate-800">系統維護</h3><div className="flex gap-4 flex-wrap"><button onClick={exportBackup} className="btn btn-primary"><Download size={18}/> 備份資料 (下載)</button><label className="btn btn-secondary cursor-pointer"><Upload size={18}/> 還原資料<input type="file" className="hidden" accept=".json" onChange={importBackup}/></label><button onClick={() => confirmAction('重置系統', '這將清空所有資料且無法復原！', () => { localStorage.clear(); window.location.reload(); })} className="btn btn-danger ml-auto"><RefreshCw size={18}/> 重置系統 (清空)</button></div></div>
                        </div>
                        {isEditingItem && (<Modal title={itemForm.id ? '編輯項目' : '新增項目'} onClose={()=>setIsEditingItem(false)}><div className="space-y-4"><div className="grid grid-cols-2 gap-4"><div><label className="text-xs font-bold text-slate-500 mb-1 block">名稱</label><input className="input-field" value={itemForm.name||''} onChange={e=>setItemForm({...itemForm, name: e.target.value})} placeholder="例如: 洗髮精"/></div><div><label className="text-xs font-bold text-slate-500 mb-1 block">分類</label><select className="input-field" value={itemForm.category} onChange={e=>setItemForm({...itemForm, category: e.target.value})}>{safeSettings.categories.map(c=><option key={c} value={c}>{c}</option>)}</select></div></div><div className="grid grid-cols-2 gap-4"><div><label className="text-xs font-bold text-slate-500 mb-1 block">售價</label><input type="number" className="input-field" value={itemForm.price||0} onChange={e=>setItemForm({...itemForm, price: e.target.value})}/></div><div><label className="text-xs font-bold text-slate-500 mb-1 block">成本 (計算毛利/支出用)</label><input type="number" className="input-field" value={itemForm.cost||0} onChange={e=>setItemForm({...itemForm, cost: e.target.value})}/></div></div><div className="border-t pt-4 mt-2"><label className="flex items-center gap-3 p-3 bg-slate-50 border rounded-lg cursor-pointer hover:bg-slate-100"><input type="checkbox" className="w-5 h-5 accent-indigo-600" checked={itemForm.isProduct||false} onChange={e=>setItemForm({...itemForm, isProduct: e.target.checked})}/><div><div className="font-bold text-slate-700">啟用庫存管理</div><div className="text-xs text-slate-500">勾選後此項目將出現在「庫存頁面」，可進行進貨與領用。</div></div></label></div><button onClick={handleSaveItem} className="btn btn-primary w-full py-3 mt-2">儲存項目</button></div></Modal>)}
                    </div>
                );
            };

            return (
                <div className="flex h-screen overflow-hidden bg-slate-100">
                    <aside className="hidden lg:flex flex-col w-64 bg-white border-r border-slate-200 z-20 shadow-sm">
                        <div className="p-6 flex items-center gap-3"><div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200">S</div><div className="font-bold text-lg text-slate-800">專屬空間沙龍</div></div>
                        <nav className="flex-1 p-4 space-y-2">
                            {[ {id:'pos', icon:CreditCard, label:'收銀開單'}, {id:'orders', icon:ClipboardList, label:'查單管理'}, {id:'report', icon:Activity, label:'營運報表'}, {id:'customers', icon:User, label:'顧客資料'}, {id:'staff', icon:UserCog, label:'人員管理'}, {id:'inventory', icon:Box, label:'商品庫存'}, {id:'settings', icon:Settings, label:'系統設定'} ].map(item=>(<button key={item.id} onClick={()=>setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-bold ${activeTab===item.id?'bg-indigo-50 text-indigo-600':'text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}><item.icon size={20}/>{item.label}</button>))}
                        </nav>
                        <div className="p-4 border-t border-slate-100 text-xs text-center text-slate-400 font-medium">Salon POS v18.0 Ultimate</div>
                    </aside>
                    <div className="lg:hidden fixed top-0 w-full bg-white border-b p-4 flex justify-between items-center z-30 shadow-sm"><div className="font-bold flex items-center gap-2"><div className="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center text-white">S</div> 專屬空間</div><button onClick={()=>setIsMobileMenuOpen(!isMobileMenuOpen)}><Menu/></button></div>
                    {isMobileMenuOpen && <div className="lg:hidden fixed inset-0 bg-slate-900/95 z-40 pt-20 px-6 space-y-4 text-white animate-fade-in"><button onClick={()=>{setActiveTab('pos'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">開單</button><button onClick={()=>{setActiveTab('orders'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">查單</button><button onClick={()=>{setActiveTab('report'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">報表</button><button onClick={()=>{setActiveTab('customers'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">客資</button><button onClick={()=>{setActiveTab('staff'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">人員</button><button onClick={()=>{setActiveTab('inventory'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">庫存</button><button onClick={()=>{setActiveTab('settings'); setIsMobileMenuOpen(false);}} className="block text-xl font-bold w-full text-left py-4 border-b border-white/10">設定</button><button onClick={()=>setIsMobileMenuOpen(false)} className="absolute top-4 right-4 p-2"><X size={24}/></button></div>}
                    <main className="flex-1 overflow-hidden relative pt-16 lg:pt-0">
                        {activeTab==='pos' && <POSView/>}
                        {activeTab==='orders' && <OrderView/>}
                        {activeTab==='report' && <ReportView/>}
                        {activeTab==='customers' && <CustomerView/>}
                        {activeTab==='staff' && <StaffView/>}
                        {activeTab==='inventory' && <InventoryView/>}
                        {activeTab==='settings' && <SettingsView/>}
                    </main>
                    <ConfirmModal {...confirmDialog} />
                    {notification && <div className={`fixed bottom-6 right-6 px-6 py-3 rounded-2xl shadow-xl z-[70] animate-fade-in text-white font-bold flex items-center gap-2 ${notification.type==='error'?'bg-red-500':'bg-slate-800'}`}>{notification.type==='error'?<X size={20}/>:<CheckCircle size={20}/>} {notification.msg}</div>}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HairSalonApp />);
    </script>
</body>
</html>
