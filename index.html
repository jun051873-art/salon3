<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專屬空間 V318 Luxe</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="專屬空間">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1d1d1f; 
            --gold: #D4AF37; 
            --luxe-border: rgba(0, 0, 0, 0.08); 
            --glass: rgba(255, 255, 255, 0.85); 
            --round-pill: 40px; 
            --ios-bg: #f2f2f7; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow: hidden; background: #fff; position: fixed; }
        body { font-family: 'Noto Sans TC', sans-serif; color: var(--primary); display: flex; flex-direction: column; }
        
        /* SweetAlert 質感升級 */
        .swal2-popup {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(25px) saturate(180%) !important;
            border-radius: 40px !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important;
        }
        .swal2-title { color: #1d1d1f !important; font-weight: 900 !important; }
        .swal2-confirm { background: var(--gold) !important; border-radius: 30px !important; font-weight: 900 !important; padding: 12px 35px !important; }

        .glow-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; background: linear-gradient(to right, #1d1d1f 20%, #D4AF37 40%, #D4AF37 60%, #1d1d1f 80%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .fab { position: fixed; bottom: 140px; right: 35px; width: 80px; height: 80px; background: var(--primary); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 2rem; z-index: 3000; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .luxe-btn { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--luxe-border); border-radius: 20px; padding: 15px 25px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.1rem; height: 55px; transition: 0.3s; }
        .luxe-btn:active { transform: scale(0.95); }

        .header { padding: 65px 40px 25px; display: flex; justify-content: space-between; align-items: flex-end; background: rgba(255,255,255,0.85); backdrop-filter: blur(35px); z-index: 1000; border-bottom: 0.5px solid var(--luxe-border); }
        .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 220px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin: 15px 40px; border-radius: 35px; overflow: hidden; background: #f2f2f7; border: 0.5px solid var(--luxe-border); }
        .cal-day { background: #fff; min-height: 125px; padding: 15px; cursor: pointer; border: 0.2px solid rgba(0,0,0,0.03); font-size: 1.4rem; position: relative; font-weight: 700; }
        .cal-day.today-highlight { color: #ff3b30; }

        /* 制式化卡片系統 - 完美鎖定比例 */
        .apt-card { 
            padding: 25px; background: #fff; border-radius: 35px; 
            border: 1px solid var(--luxe-border); border-left: 12px solid var(--c); 
            position: relative; flex: 1; display: flex; flex-direction: column; 
            justify-content: space-between; transition: 0.4s; box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            max-width: 480px; margin-bottom: 20px;
        }
        .apt-card.completed { opacity: 0.3 !important; background: #f9f9fb !important; filter: grayscale(1); transform: scale(0.98); }
        
        .lane-container { display: flex; overflow-x: auto; padding: 35px 40px; gap: 30px; flex: 1; align-items: flex-start; }
        .lane { flex: 1; min-width: 380px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .time-row-space { min-height: 220px; display: flex; flex-direction: row; gap: 15px; align-items: stretch; position: relative; border-bottom: 0.5px solid #f2f2f7; }
        .time-label { position: absolute; left: -45px; top: 0; font-size: 0.8rem; color: #aeaeb2; font-weight: 900; }

        .client-grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 25px; padding: 25px 40px; }

        .nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 700px; height: 105px; background: rgba(255,255,255,0.92); backdrop-filter: blur(40px); display: flex; justify-content: space-around; align-items: center; border-radius: 50px; border: 1px solid var(--luxe-border); z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .nav-item { text-align: center; color: #d1d1d6; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); transform: translateY(-5px); }
        .nav-item i { font-size: 1.8rem; }
        .nav-item span { font-size: 1rem; font-weight: 900; display: block; margin-top: 5px; }

        /* 標籤進化：SF Symbols Style */
        .tag-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .tag-pill { 
            font-size: 0.8rem; font-weight: 800; padding: 8px 15px; border-radius: 12px; 
            background: var(--ios-bg); color: #aeaeb2; transition: 0.2s; 
            display: inline-flex; align-items: center; gap: 6px; border: none;
        }
        .tag-pill.active-L { background: #34c759 !important; color: #fff !important; }
        .tag-pill.active-J { background: #ff3b30 !important; color: #fff !important; }
        .tag-pill.active-C { background: #5856d6 !important; color: #fff !important; }
        .tag-pill.active-VIP { background: var(--gold) !important; color: #fff !important; }

        .drawer-btn { width: 100%; padding: 20px; background: #f9f9fb; border: 1.5px solid var(--gold); border-radius: 25px; display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 15px; }
        .drawer-content { display: none; padding: 15px; background: #f9f9fb; border-radius: 0 0 25px 25px; border: 1.5px solid var(--gold); border-top: none; margin-top: -15px; margin-bottom: 15px; text-align: left; }
        .shield-input { border-radius: 15px; width: 75px; height: 45px; text-align: center; border: 2px solid var(--gold); background: #fff; font-weight: 900; font-size: 1.2rem; }
        .tag-chip { display: inline-block; padding: 15px 25px; border-radius: 30px; border: 1px solid var(--gold); margin: 8px; font-weight: 900; font-size: 1.1rem; background: #fff; cursor: pointer; }
        .tag-chip.selected { background: var(--gold); color: #fff; border-color: var(--gold); }
        
        .suggest-box { position: absolute; width: 100%; background: #fff; border: 2px solid var(--gold); border-radius: 20px; z-index: 5000; display: none; max-height: 250px; overflow-y: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .suggest-item { padding: 15px 25px; border-bottom: 0.5px solid #eee; font-weight: 900; font-size: 1.1rem; }

        @media (max-width: 480px) {
            .header { padding: 55px 30px 15px; }
            .glow-title { font-size: 1.8rem; }
            .calendar-grid { margin: 10px 15px; border-radius: 25px; }
            .cal-day { min-height: 90px; font-size: 1.1rem; }
            .nav { width: 92%; height: 90px; bottom: 25px; border-radius: 45px; }
            .nav-item i { font-size: 1.5rem; }
            .apt-card { padding: 20px; border-radius: 30px; }
        }
   </style>
</head>
<body>

<div id="pg-res" class="page active">
    <div class="header">
        <div class="glow-title">專屬空間</div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="luxe-btn" onclick="goToday()">今天</div>
            <input type="month" id="m-picker" onchange="initMonth()" class="luxe-btn" style="width: 180px; background:#f2f2f7;">
        </div>
    </div>
    <div class="calendar-header" style="display:grid; grid-template-columns: repeat(7, 1fr); margin: 25px 40px 0; text-align: center; font-size: 1.1rem; font-weight: 900; color: #aeaeb2;"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
    <div class="content-scroll"><div id="cal-grid" class="calendar-grid"></div></div>
</div>

<div id="pg-cli" class="page">
    <div class="header">
        <div style="font-size: 2.6rem; font-weight: 900; cursor:pointer;" onclick="cliKw=''; renderCli();">顧客</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <div style="position:relative;"><div class="luxe-btn" onclick="popCliSearch()"><i class="fas fa-search"></i></div><div id="cli-sw-box" class="suggest-box" style="width:350px; right:0;"></div></div>
            <select id="cli-f-sty" class="luxe-btn" onchange="renderCli()"></select>
            <div class="luxe-btn" onclick="addCliTrig()" style="font-size:2.2rem; padding:12px 35px;">+</div>
        </div>
    </div>
    <div class="content-scroll"><div class="client-grid-container" id="cli-list"></div></div>
</div>

<div id="pg-set" class="page">
    <div class="header"><div style="font-size: 2.6rem; font-weight: 900;">設定</div></div>
    <div class="content-scroll" style="padding:0 45px;" id="set-content-container"></div>
</div>

<div id="pg-day" class="page">
    <div class="header">
        <div style="display:flex; align-items:center; gap:25px;">
            <i class="fas fa-chevron-left luxe-btn" style="border:none;" onclick="showP('pg-res')"></i>
            <i class="fas fa-chevron-left luxe-btn" onclick="shiftDay(-1)"></i>
            <div id="day-title" style="font-weight:900; font-size:2rem;"></div>
            <i class="fas fa-chevron-right luxe-btn" onclick="shiftDay(1)"></i>
        </div>
        <div class="luxe-btn" onclick="goToday()">今天</div>
    </div>
    <div class="lane-container" id="day-lanes"></div>
</div>

<button class="fab" onclick="popBooking()"><i class="fas fa-plus"></i></button>

<nav class="nav">
    <div onclick="showP('pg-res')" id="n-res" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>預約表</span></div>
    <div onclick="showP('pg-cli')" id="n-cli" class="nav-item"><i class="fas fa-user-circle"></i><span>顧客</span></div>
    <div onclick="showP('pg-set')" id="n-set" class="nav-item"><i class="fas fa-sliders-h"></i><span>設定</span></div>
</nav>

<script>
    let curD = new Date();
    let tempTags = [];
    let cliKw = "";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybDgSJuk48LPv4lCIFqiAv3vL3XkK1DdObhw6agADIY4J2GqQiW0Zt3IP35hrIbMVT/exec";
    
    let store = JSON.parse(localStorage.getItem('SALON_LOCK_V318')) || {
        startH: "11:00", endH: "19:00", offColor: "#e5e5ea", gSheetUrl: GAS_URL,
        stylists: [{id: 1, name: 'Tonny', color: '#1d1d1f'}, {id: 2, name: 'Apple', color: '#D4AF37'}],      
        tags: [{id: 1, name: '剪髮'}, {id: 2, name: '洗髮'}], appointments: [], clients: [], offDays: []
    };

    // --- 雲端與同步核心 ---
    async function pullFromGSheet(isManual = false) {
        if(isManual) Swal.showLoading(); 
        try {
            const response = await fetch(GAS_URL + "?t=" + Date.now());
            const cloudData = await response.json();
            if (cloudData) {
                store = cloudData;
                localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
                refreshUI();
                if(isManual) Swal.fire({ icon: 'success', title: '雲端同步成功', timer: 1000, showConfirmButton: false });
            }
        } catch (e) { console.error("同步失敗", e); }
    }

    function saveS() { 
        localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store)); 
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(store) }); 
    }

    function refreshUI() { initMonth(); renderCli(); fillStySelect(); renderSet(); if(document.getElementById('pg-day').classList.contains('active')) renderDay(curD.toLocaleDateString('sv')); }

    window.addEventListener('load', () => pullFromGSheet());

    // --- 頁面控制 ---
    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        if(id.includes('res')) initMonth(); 
        else if(id==='pg-cli') { fillStySelect(); renderCli(); } 
        else if(id==='pg-set') renderSet(); 
        else if(id==='pg-day') renderDay(curD.toLocaleDateString('sv'));
    }

    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }

    // --- 搜尋與建議邏輯 ---
    function searchStored(el, boxId) {
        const val = el.value.trim(); const box = document.getElementById(boxId);
        if(!val) { box.style.display='none'; return; }
        const ms = store.clients.filter(c => (c.n||c.name||"").includes(val) || (c.p||c.phone||"").includes(val));
        if(ms.length) { box.style.display='block'; box.innerHTML = ms.map(m => `<div class="suggest-item" onclick="pickSug('${m.n||m.name}', '${m.p||m.phone}', '${m.lastSty}', '${boxId}')">${m.n||m.name} (${m.p||m.phone})</div>`).join(''); } else box.style.display='none';
    }

    function pickSug(n, p, s, boxId) {
        if(boxId === 'sw-box' || boxId === 'cli-sw-box') { cliKw = n; renderCli(); Swal.close(); }
        else { document.getElementById('pop-n').value=n; document.getElementById('pop-p').value=p; document.getElementById('pop-s').value=s; document.getElementById('pop-box').style.display='none'; }
    }

    async function popCliSearch() { await Swal.fire({ title: '搜尋顧客', html: `<input id="sw-search" class="luxe-btn" style="width:100%;" oninput="searchStored(this, 'sw-box')"><div id="sw-box" class="suggest-box"></div>`, showConfirmButton: false }); }

    // --- 核心渲染：當日預約 ---
    function renderDay(ds) {
        const days = ['日','一','二','三','四','五','六'];
        document.getElementById('day-title').innerText = `${ds} (週${days[new Date(ds).getDay()]})`; 
        const area = document.getElementById('day-lanes'); area.innerHTML = '';
        const start = parseInt(store.startH || '11'), end = parseInt(store.endH || '19');

        store.stylists.forEach(s => {
            const lane = document.createElement('div'); lane.className = 'lane';
            lane.innerHTML = `<div style="text-align:center; font-weight:900; color:${s.color}; font-size:1.8rem; margin-bottom:20px;">${s.name}</div>`;
            for(let h=start; h<=end; h++){
                const row = document.createElement('div'); row.className = 'time-row-space';
                const matched = store.appointments.filter(a => a.date === ds && a.time.split(':')[0] === h.toString().padStart(2,'0') && String(a.styId) === String(s.id));
                row.innerHTML = `<div class="time-label">${h}:00</div>`;
                if(matched.length) {
                    row.innerHTML += matched.map(a => `
                        <div class="apt-card ${a.done?'completed':''}" style="--c:${s.color};">
                            <div class="tag-group">
                                <span class="tag-pill ${a.payTags?.includes('L')?'active-L':''}" onclick="event.stopPropagation(); togglePay('${a.id}','L','${ds}')"><i class="fab fa-line"></i></span>
                                <span class="tag-pill ${a.payTags?.includes('J')?'active-J':''}" onclick="event.stopPropagation(); togglePay('${a.id}','J','${ds}')"><i class="fas fa-wallet"></i></span>
                                <span class="tag-pill ${a.payTags?.includes('C')?'active-C':''}" onclick="event.stopPropagation(); togglePay('${a.id}','C','${ds}')"><i class="fas fa-coins"></i></span>
                                <span class="tag-pill ${a.isVIP ? 'active-VIP' : ''}" onclick="event.stopPropagation(); toggleVIP('${a.id}','${ds}')">${a.isVIP ? '<i class="fas fa-star"></i>' : '<i class="far fa-star"></i>'}</span>
                            </div>
                            <div style="position:absolute; right:20px; top:20px; display:flex; gap:15px; align-items:center;">
                                <i class="fas fa-pen" style="color:#ccc; font-size:1.4rem;" onclick="event.stopPropagation(); popBooking('${a.n||a.name}','${a.p||a.phone}','${a.styId}','${a.id}')"></i>
                                <i class="fas fa-trash-alt" style="color:rgba(255,0,0,0.15); font-size:1.4rem;" onclick="event.stopPropagation(); confirmDelApt('${a.id}','${ds}')"></i>
                                <i class="fas fa-check-circle" style="color:${a.done?'#34c759':'#eee'}; font-size:2.4rem;" onclick="event.stopPropagation(); toggleAptDone('${a.id}','${ds}')"></i>
                            </div>
                            <div style="font-weight:900; color:var(--gold); font-size:1.1rem;">${a.time}</div>
                            <div style="font-weight:900; font-size:2rem; margin:5px 0;">${a.n || a.name}</div>
                            <div onclick="event.stopPropagation(); popNoteEdit('${a.id}', '${ds}')" style="background:rgba(212,175,55,0.05); padding:18px; border-radius:25px; border-left:5px solid var(--gold); margin-top:10px; cursor:pointer;">
                                <div style="font-weight:900; color:var(--gold); font-size:1.1rem; margin-bottom:5px;">✂️ ${(a.tags || []).join('+') || '服務項目'}</div>
                                <div style="font-size:1rem; color:#444; line-height:1.5; white-space: pre-wrap; font-weight:700;">${a.note_full || "點擊輸入備註..."}</div>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:12px; border-top:1px dashed #eee;">
                                <div style="font-weight:900; color:#888; font-size:1.1rem;">📞 ${a.p||"未留"}</div>
                                <div style="font-weight:900; color:var(--gold); font-size:1.1rem;">👤 ${a.c||"1"}人</div>
                            </div>
                        </div>`).join('');
                } else row.innerHTML += `<div style="flex:1; border-bottom:0.5px solid #f2f2f7; margin-left:15px;"></div>`;
                lane.appendChild(row);
            }
            area.appendChild(lane);
        });
    }

    // --- 預約視窗邏輯 ---
    async function popBooking(n="", p="", sId=null, editId=null) {
        const apt = editId ? store.appointments.find(a => String(a.id) === String(editId)) : null;
        tempTags = apt ? [...(apt.tags || [])] : [];
        const { value: res } = await Swal.fire({
            title: editId ? '修改預約' : '新增預約', width: '90%',
            html: `
                <div style="position:relative; margin-bottom:15px;"><input id="pop-n" class="luxe-btn" style="width:100%; font-size:1.6rem;" value="${n}" placeholder="姓名" oninput="searchStored(this, 'pop-box')"><div id="pop-box" class="suggest-box"></div></div>
                <input id="pop-p" class="luxe-btn" style="width:100%; margin-bottom:15px;" value="${p}" placeholder="電話號碼">
                <div style="display:flex; gap:12px; margin-bottom:15px; align-items:center;">
                    <select id="pop-s" class="luxe-btn" style="flex:1.5;">${store.stylists.map(s=>`<option value="${s.id}" ${String(s.id)===String(sId||1)?'selected':''}>${s.name}</option>`).join('')}</select>
                    <div style="flex:1; display:flex; align-items:center; gap:8px;"><span style="font-weight:900;">人數</span><input id="pop-c" class="shield-input" type="text" value="${apt?apt.c||1:1}"></div>
                </div>
                <textarea id="pop-note" class="luxe-btn" style="width:100%; height:120px; margin-bottom:15px;" placeholder="備註內容...">${apt?apt.note_full||"" : ""}</textarea>
                <div class="drawer-btn" onclick="const c=document.getElementById('pop-tg-dr'); c.style.display=c.style.display==='block'?'none':'block';">項目清單 <i class="fas fa-chevron-down"></i></div>
                <div id="pop-tg-dr" class="drawer-content">${store.tags.map(t=>`<div class="tag-chip ${tempTags.includes(t.name)?'selected':''}" onclick="this.classList.toggle('selected'); const i=tempTags.indexOf('${t.name}'); if(i>-1) tempTags.splice(i,1); else tempTags.push('${t.name}')">${t.name}</div>`).join('')}</div>
                <div style="margin: 20px 0; font-weight:900; color:var(--gold);"><input type="checkbox" id="pop-save-cli" ${editId?'disabled':'checked'}> 同步至顧客名冊</div>
                <div style="display:flex; gap:12px;"><input id="pop-d" class="luxe-btn" type="date" value="${apt?apt.date:curD.toLocaleDateString('sv')}" style="flex:1.5;"><input id="pop-t" class="luxe-btn" type="time" value="${apt?apt.time:'12:00'}" style="flex:1;"></div>`,
            preConfirm: () => ({ n: document.getElementById('pop-n').value, p: document.getElementById('pop-p').value, styId: document.getElementById('pop-s').value, c: document.getElementById('pop-c').value, note: document.getElementById('pop-note').value, d: document.getElementById('pop-d').value, t: document.getElementById('pop-t').value, saveCli: document.getElementById('pop-save-cli').checked })
        });
        if (res && res.n) {
            const data = { id: editId || String(Date.now()), n: res.n, p: res.p, styId: res.styId, c: res.c, note_full: res.note, date: res.d, time: res.t, tags: [...tempTags], done: apt?apt.done:false, payTags: apt?apt.payTags:[], isVIP: apt?apt.isVIP:false };
            if (editId) store.appointments = store.appointments.map(a => String(a.id) === String(editId) ? data : a);
            else { store.appointments.push(data); if(res.saveCli && !store.clients.find(c => c.n === res.n)) store.clients.push({ n: res.n, p: res.p, lastSty: res.styId, bm: '', bd: '', note: res.note }); }
            saveS(); refreshUI();
        }
    }

    // --- 顧客名冊：制式化升級 ---
    function renderCli() {
        const area = document.getElementById('cli-list');
        const f = document.getElementById('cli-f-sty').value;
        area.innerHTML = store.clients.filter(c => ((c.n||"").includes(cliKw) || (c.p||"").includes(cliKw)) && (!f || String(c.lastSty) === String(f)))
            .map(c => {
                const sty = store.stylists.find(s => String(s.id) === String(c.lastSty));
                const history = store.appointments.filter(a => (a.n === c.n || a.name === c.n) && a.done).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
                return `
                <div class="apt-card" style="--c:${sty?.color||'#eee'}; width:100%; border-left:15px solid ${sty?.color||'#eee'};">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-weight:900; font-size:2.2rem;">${c.n}</div>
                            <div style="color:#666; font-size:1.1rem; margin-top:5px;">📞 ${c.p||"未設"} | 🎂 ${c.bm||""}/${c.bd||""}</div>
                        </div>
                        <div style="background:${sty?.color||'#eee'}; color:#fff; padding:10px 20px; border-radius:20px; font-weight:900; font-size:1rem;">👤 ${sty?.name || "未指定"}</div>
                    </div>
                    <div style="background:#fcfcfd; padding:20px; border-radius:25px; margin-top:15px; border:1.5px solid #f2f2f7;">
                        <div style="font-size:0.9rem; font-weight:900; color:#aeaeb2; margin-bottom:10px;">最近預約</div>
                        ${history.map(h => `<div style="padding:5px 0; border-bottom:0.5px dashed #eee;"><b>${h.date}</b>: ${(h.tags||[]).join('+')}</div>`).join('') || '尚無紀錄'}
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:30px; margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                        <i class="fas fa-pen" style="color:#ccc; font-size:1.5rem;" onclick="editCli('${c.n}')"></i>
                        <i class="fas fa-trash-alt" style="color:rgba(255,0,0,0.1); font-size:1.5rem;" onclick="confirmDelCli('${c.n}')"></i>
                    </div>
                </div>`;
            }).join('');
    }

    // --- 設定頁面 (補回功能) ---
    function renderSet() {
        const c = document.getElementById('set-content-container');
        c.innerHTML = `
            <div style="margin-bottom:60px;"><p style="font-weight:900; color:#8e8e93;">0. 營業時間</p><div style="display:flex; gap:25px;"><input type="time" class="luxe-btn" style="flex:1;" value="${store.startH}" onchange="store.startH=this.value;saveS();">至<input type="time" class="luxe-btn" style="flex:1;" value="${store.endH}" onchange="store.endH=this.value;saveS();"></div></div>
            <div style="margin-bottom:60px;"><p style="font-weight:900; color:#8e8e93;">1. 排休設定</p><div class="luxe-btn" style="width:100%;" onclick="pickOffMulti()">選擇月份與日期</div></div>
            <div style="margin-bottom:60px;"><p style="font-weight:900; color:#8e8e93;">2. 人員管理</p>${store.stylists.map(s => `<div class="luxe-btn" style="width:100%; margin-bottom:15px; justify-content:space-between;"><div><span style="color:${s.color}">●</span> ${s.name}</div><div style="display:flex; gap:20px;"><i class="fas fa-pen" onclick="editStyTrig(${s.id},'${s.name}')"></i><i class="fas fa-times" style="color:#ff3b30; opacity:0.3;" onclick="confirmDelSty(${s.id})"></i></div></div>`).join('')}<div class="luxe-btn" style="width:100%; border:2px dashed var(--gold); background:none; color:var(--gold);" onclick="addStyTrig()">+ 新增服務人員</div></div>
            <div style="margin-bottom:60px;"><p style="font-weight:900; color:#8e8e93;">3. 項目管理</p><div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:15px;">${store.tags.map(t => `<div class="luxe-btn" style="height:auto; padding:10px 20px;">${t.name} <i class="fas fa-times" style="margin-left:10px; opacity:0.3;" onclick="confirmDelTag(${t.id})"></i></div>`).join('')}</div><div class="luxe-btn" style="width:100%; border:2px dashed var(--gold); background:none; color:var(--gold);" onclick="addTagTrig()">+ 新增服務項目</div></div>
            <div style="margin-bottom:60px;"><p style="font-weight:900; color:#8e8e93;">4. 數據備份與同步</p><div class="luxe-btn" style="width:100%; background:rgba(212,175,55,0.1); color:var(--gold); margin-bottom:20px;" onclick="pullFromGSheet(true)">強制同步雲端最新資料</div><div style="display:flex; gap:20px;"><div class="luxe-btn" style="flex:1;" onclick="exportToFile()">下載存檔</div><div class="luxe-btn" style="flex:1;" onclick="triggerLoad()">讀取存檔</div></div></div>
        `;
    }

    // --- 日曆初始化 ---
    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; 
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const dots = [...new Set(store.appointments.filter(a => a.date === ds).map(a => store.stylists.find(st => st.id == a.styId)?.color || '#ddd'))].map(c => `<div style="width:12px;height:12px;border-radius:50%;background:${c};display:inline-block;margin:3px;"></div>`).join('');
            el.innerHTML = `<div>${d}</div><div style="margin-top:10px;">${dots}</div>`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }

    // --- 工具函數 (不閹割) ---
    function fillStySelect() { const sel = document.getElementById('cli-f-sty'); if(sel) sel.innerHTML = '<option value="">所有人</option>' + store.stylists.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); }
    function togglePay(id, code, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); if(!a.payTags) a.payTags = []; const i = a.payTags.indexOf(code); if(i > -1) a.payTags.splice(i, 1); else a.payTags.push(code); saveS(); renderDay(ds); }
    function toggleVIP(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); a.isVIP = !a.isVIP; saveS(); renderDay(ds); }
    function toggleAptDone(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); if(a){ a.done = !a.done; saveS(); renderDay(ds); } }
    async function popNoteEdit(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); const {value:t} = await Swal.fire({title:'詳細備註', input:'textarea', inputValue:a.note_full||""}); if(t!==undefined){a.note_full=t; saveS(); renderDay(ds);} }
    async function addCliTrig() { const { value: r } = await Swal.fire({ title: '新增顧客', html: `<input id="cn" class="luxe-btn" style="width:100%;margin-bottom:15px;" placeholder="姓名"><input id="cp" class="luxe-btn" style="width:100%;margin-bottom:15px;" placeholder="電話"><select id="cs" class="luxe-btn" style="width:100%;">${store.stylists.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><div style="margin-top:15px;"><span style="font-weight:900;">🎂 生日</span> <input id="cm" class="shield-input" placeholder="月"> / <input id="cd" class="shield-input" placeholder="日"></div>`, preConfirm: () => ({ n: document.getElementById('cn').value, p: document.getElementById('cp').value, s: document.getElementById('cs').value, m: document.getElementById('cm').value, d: document.getElementById('cd').value }) }); if (r && r.n) { store.clients.push({ n: r.n, p: r.p, lastSty: r.s, bm: r.m, bd: r.d }); saveS(); renderCli(); } }
    async function editCli(oldN) { const c = store.clients.find(x => x.n === oldN); const { value: r } = await Swal.fire({ title: '修改資料', html: `<input id="en" class="luxe-btn" style="width:100%;margin-bottom:15px;" value="${c.n}"><input id="ep" class="luxe-btn" style="width:100%;margin-bottom:15px;" value="${c.p}"><select id="es" class="luxe-btn" style="width:100%;">${store.stylists.map(s=>`<option value="${s.id}" ${String(s.id)===String(c.lastSty)?'selected':''}>${s.name}</option>`).join('')}</select><div style="margin-top:15px;"><span style="font-weight:900;">🎂</span> <input id="em" class="shield-input" value="${c.bm||''}"> / <input id="ed" class="shield-input" value="${c.bd||''}"></div>`, preConfirm: () => ({ n: document.getElementById('en').value, p: document.getElementById('ep').value, s: document.getElementById('es').value, m: document.getElementById('em').value, d: document.getElementById('ed').value }) }); if (r) { Object.assign(c, { n:r.n, p:r.p, lastSty:r.s, bm:r.m, bd:r.d }); saveS(); renderCli(); } }
    async function pickOffMulti() { const { value: month } = await Swal.fire({ title: '選擇月份', input: 'month' }); if (!month) return; await Swal.fire({ title: `${month} 休假設定`, html: '<div id="sw-cal" style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;"></div>', didOpen: () => { const g = document.getElementById('sw-cal'); const pick = new Date(month + "-01"); const days = new Date(pick.getFullYear(), pick.getMonth()+1, 0).getDate(); for(let d=1; d<=days; d++){ const ds = `${pick.getFullYear()}-${String(pick.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const el = document.createElement('div'); el.innerText = d; el.style.padding = "15px"; el.style.background = store.offDays.includes(ds) ? store.offColor : "#fff"; el.style.border = "1px solid #eee"; el.style.borderRadius = "15px"; el.onclick = () => { const i = store.offDays.indexOf(ds); if(i>-1) store.offDays.splice(i,1); else store.offDays.push(ds); saveS(); el.style.background = store.offDays.includes(ds) ? store.offColor : "#fff"; initMonth(); }; g.appendChild(el); } } }); }
    async function editStyTrig(id, old) { const {value:n}=await Swal.fire({title:'更名', input:'text', inputValue:old}); if(n){store.stylists.find(x=>x.id==id).name=n; saveS(); renderSet();} }
    async function editTagTrig(id, old) { const {value:n}=await Swal.fire({title:'更名', input:'text', inputValue:old}); if(n){store.tags.find(x=>x.id==id).name=n; saveS(); renderSet();} }
    async function addTagTrig() { const {value:n}=await Swal.fire({title:'項目名稱', input:'text'}); if(n){store.tags.push({id:Date.now(), name:n}); saveS(); renderSet();} }
    async function addStyTrig() { const {value:n}=await Swal.fire({title:'姓名', input:'text'}); if(n){store.stylists.push({id:Date.now(), name:n, color:'#D4AF37'}); saveS(); renderSet();} }
    function confirmDelApt(id, ds) { Swal.fire({title:'刪除預約？', icon:'warning', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.appointments=store.appointments.filter(a=>String(a.id)!==String(id));saveS();renderDay(ds);}}); }
    function confirmDelCli(n) { Swal.fire({title:'刪除顧客？', icon:'warning', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.clients=store.clients.filter(c=>c.n!==n);saveS();renderCli();}}); }
    function confirmDelSty(id) { Swal.fire({title:'移除人員？', icon:'warning', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.stylists=store.stylists.filter(s=>s.id!==id);saveS();renderSet();}}); }
    function confirmDelTag(id) { Swal.fire({title:'移除項目？', icon:'warning', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.tags=store.tags.filter(t=>t.id!==id);saveS();renderSet();}}); }
    function triggerLoad() { const i = document.createElement('input'); i.type = 'file'; i.onchange = e => { const r = new FileReader(); r.onload = () => { store = JSON.parse(r.result); saveS(); location.reload(); }; r.readAsText(e.target.files[0]); }; i.click(); }
    function exportToFile() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(store)],{type:'application/json'})); a.download=`backup.json`; a.click(); }

    document.getElementById('m-picker').value = new Date().toISOString().slice(0,7);
    refreshUI();
</script>
</body>
</html>
