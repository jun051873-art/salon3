<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>專屬空間 V318 Luxe</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1d1d1f; --gold: #D4AF37; --luxe-border: rgba(0, 0, 0, 0.08); --glass: rgba(255, 255, 255, 0.85); --ios-bg: #f2f2f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow: hidden; background: #fff; position: fixed; }
        body { font-family: 'Noto Sans TC', sans-serif; color: var(--primary); display: flex; flex-direction: column; }
        
        /* SweetAlert 質感 */
        .swal2-popup { background: rgba(255, 255, 255, 0.8) !important; backdrop-filter: blur(25px) saturate(180%) !important; border-radius: 40px !important; box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important; border: 1px solid rgba(255,255,255,0.3) !important; }
        .swal2-title { color: #1d1d1f !important; font-weight: 900 !important; }
        .swal2-confirm { background: var(--gold) !important; border-radius: 30px !important; font-weight: 900 !important; }

        .glow-title { font-size: 2rem; font-weight: 900; letter-spacing: -1.5px; background: linear-gradient(to right, #1d1d1f 20%, #D4AF37 40%, #D4AF37 60%, #1d1d1f 80%); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .header { padding: 60px 30px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(30px); z-index: 1000; border-bottom: 0.5px solid var(--luxe-border); }
        .luxe-btn { background: var(--ios-bg); border: none; border-radius: 18px; padding: 12px 20px; font-weight: 800; cursor: pointer; color: var(--primary); transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; }
        .luxe-btn:active { transform: scale(0.95); }

        .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 180px; }
        
        /* 制式化卡片 - 鎖定比例不跑位 */
        .apt-card { 
            padding: 22px; background: #fff; border-radius: 32px; 
            border: 1px solid var(--luxe-border); border-left: 12px solid var(--c); 
            position: relative; width: 100%; max-width: 480px; margin: 0 auto 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .apt-card.completed { opacity: 0.35 !important; filter: grayscale(1); transform: scale(0.98); }

        /* 符號升級 */
        .tag-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .tag-pill { 
            font-size: 0.75rem; font-weight: 800; padding: 6px 10px; border-radius: 10px; 
            background: var(--ios-bg); color: #aeaeb2; border: none; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center; min-width: 38px;
        }
        .tag-pill.active-L { background: #34c759 !important; color: #fff !important; }
        .tag-pill.active-J { background: #ff3b30 !important; color: #fff !important; }
        .tag-pill.active-C { background: #5856d6 !important; color: #fff !important; }
        .tag-pill.active-VIP { background: var(--gold) !important; color: #fff !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin: 10px 20px; border-radius: 25px; overflow: hidden; background: #f2f2f7; border: 0.5px solid var(--luxe-border); }
        .cal-day { background: #fff; min-height: 100px; padding: 12px; cursor: pointer; border: 0.2px solid rgba(0,0,0,0.02); font-size: 1.2rem; font-weight: 700; position: relative; }
        .cal-day.today-highlight { color: #ff3b30; }

        .lane-container { display: flex; overflow-x: auto; padding: 25px 20px; gap: 20px; }
        .lane { min-width: 85vw; max-width: 420px; flex-shrink: 0; }
        .time-row-space { min-height: 140px; position: relative; margin-left: 45px; border-bottom: 0.5px solid #f2f2f7; }
        .time-label { position: absolute; left: -45px; top: 0; font-size: 0.75rem; font-weight: 900; color: #c7c7cc; }

        .nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 600px; height: 85px; background: rgba(255,255,255,0.9); backdrop-filter: blur(40px); display: flex; justify-content: space-around; align-items: center; border-radius: 42px; border: 1px solid var(--luxe-border); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-item { text-align: center; color: #d1d1d6; cursor: pointer; transition: 0.3s; flex: 1; }
        .nav-item.active { color: var(--primary); transform: translateY(-3px); }
        .nav-item i { font-size: 1.5rem; }
        .nav-item span { font-size: 0.75rem; font-weight: 900; display: block; margin-top: 5px; }

        .fab { position: fixed; bottom: 130px; right: 25px; width: 70px; height: 70px; background: var(--primary); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.6rem; z-index: 3000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .page { display: none; width: 100%; height: 100%; }
        .page.active { display: flex !important; flex-direction: column; }
        
        .suggest-box { position: absolute; width: 100%; background: #fff; border: 2px solid var(--gold); border-radius: 18px; z-index: 5000; display: none; max-height: 200px; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .suggest-item { padding: 14px 20px; border-bottom: 0.5px solid #f2f2f7; font-weight: 800; }
        .shield-input { border-radius: 12px; width: 65px; height: 40px; text-align: center; border: 1.5px solid var(--gold); font-weight: 900; }
        
        @media (max-width: 480px) {
            .header { padding: 50px 20px 15px; }
            .glow-title { font-size: 1.6rem; }
            .cal-day { min-height: 85px; font-size: 1rem; }
            .apt-card { border-radius: 28px; padding: 18px; }
        }
    </style>
</head>
<body>

<div id="pg-res" class="page active">
    <div class="header">
        <div class="glow-title">專屬空間</div>
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="luxe-btn" onclick="goToday()">今天</div>
            <input type="month" id="m-picker" onchange="initMonth()" class="luxe-btn" style="width: 145px;">
        </div>
    </div>
    <div class="calendar-header" style="display:grid; grid-template-columns: repeat(7, 1fr); margin: 15px 20px 5px; text-align: center; font-size: 0.8rem; font-weight: 900; color: #aeaeb2;"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>
    <div class="content-scroll"><div id="cal-grid" class="calendar-grid"></div></div>
</div>

<div id="pg-cli" class="page">
    <div class="header">
        <div style="font-size: 1.8rem; font-weight: 900;">顧客</div>
        <div style="display:flex; gap:12px;">
            <div class="luxe-btn" onclick="popCliSearch()"><i class="fas fa-search"></i></div>
            <select id="cli-f-sty" class="luxe-btn" style="width:110px;" onchange="renderCli()"></select>
            <div class="luxe-btn" onclick="addCliTrig()">+</div>
        </div>
    </div>
    <div class="content-scroll" id="cli-list" style="padding: 20px;"></div>
</div>

<div id="pg-set" class="page">
    <div class="header"><div style="font-size: 1.8rem; font-weight: 900;">設定</div></div>
    <div class="content-scroll" id="set-content-container" style="padding: 25px;"></div>
</div>

<div id="pg-day" class="page">
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <i class="fas fa-chevron-left luxe-btn" style="background:none;" onclick="showP('pg-res')"></i>
            <div id="day-title" style="font-weight:900; font-size:1.2rem;"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <i class="fas fa-chevron-left luxe-btn" onclick="shiftDay(-1)"></i>
            <i class="fas fa-chevron-right luxe-btn" onclick="shiftDay(1)"></i>
        </div>
    </div>
    <div class="content-scroll"><div class="lane-container" id="day-lanes"></div></div>
</div>

<button class="fab" onclick="popBooking()"><i class="fas fa-plus"></i></button>

<nav class="nav">
    <div onclick="showP('pg-res')" id="n-res" class="nav-item active"><i class="fas fa-calendar-alt"></i><span>預約表</span></div>
    <div onclick="showP('pg-cli')" id="n-cli" class="nav-item"><i class="fas fa-users"></i><span>顧客</span></div>
    <div onclick="showP('pg-set')" id="n-set" class="nav-item"><i class="fas fa-cog"></i><span>設定</span></div>
</nav>

<script>
    let curD = new Date();
    let tempTags = [];
    let cliKw = "";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybDgSJuk48LPv4lCIFqiAv3vL3XkK1DdObhw6agADIY4J2GqQiW0Zt3IP35hrIbMVT/exec";
    
    let store = JSON.parse(localStorage.getItem('SALON_LOCK_V318')) || {
        startH: "11:00", endH: "19:00", offColor: "#e5e5ea", 
        stylists: [{id: 1, name: 'Tonny', color: '#1d1d1f'}, {id: 2, name: 'Apple', color: '#D4AF37'}],      
        tags: [{id: 1, name: '剪髮'}, {id: 2, name: '洗髮'}], appointments: [], clients: [], offDays: []
    };

    // --- 導航修復核心 ---
    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        const targetPage = document.getElementById(id);
        if(targetPage) {
            targetPage.classList.add('active');
            const navId = 'n-' + id.split('-')[1];
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');
        }

        if(id==='pg-res') initMonth(); 
        else if(id==='pg-cli') { fillStySelect(); renderCli(); } 
        else if(id==='pg-set') renderSet(); 
        else if(id==='pg-day') renderDay(curD.toLocaleDateString('sv'));
    }

    async function pullFromGSheet(isManual = false) {
        if(isManual) Swal.showLoading();
        try {
            const response = await fetch(GAS_URL + "?t=" + Date.now());
            const data = await response.json();
            if (data) {
                store = data;
                localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store));
                refreshUI();
                if(isManual) Swal.fire({ icon: 'success', title: '同步成功', timer: 800, showConfirmButton: false });
            }
        } catch (e) { console.error(e); }
    }

    function saveS() { 
        localStorage.setItem('SALON_LOCK_V318', JSON.stringify(store)); 
        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(store) }); 
    }

    function refreshUI() { initMonth(); renderCli(); fillStySelect(); renderSet(); if(document.getElementById('pg-day').classList.contains('active')) renderDay(curD.toLocaleDateString('sv')); }
    function goToday() { curD = new Date(); renderDay(curD.toLocaleDateString('sv')); showP('pg-day'); }
    function shiftDay(v) { curD.setDate(curD.getDate() + v); renderDay(curD.toLocaleDateString('sv')); }

    // --- 預約渲染 ---
    function renderDay(ds) {
        const days = ['日','一','二','三','四','五','六'];
        document.getElementById('day-title').innerText = `${ds} (週${days[new Date(ds).getDay()]})`; 
        const area = document.getElementById('day-lanes'); area.innerHTML = '';
        const start = parseInt(store.startH), end = parseInt(store.endH);

        store.stylists.forEach(s => {
            const lane = document.createElement('div'); lane.className = 'lane';
            lane.innerHTML = `<div style="text-align:center; font-weight:900; color:${s.color}; font-size:1.4rem; margin-bottom:15px;">${s.name}</div>`;
            for(let h=start; h<=end; h++){
                const row = document.createElement('div'); row.className = 'time-row-space';
                const matched = store.appointments.filter(a => a.date === ds && a.time.startsWith(h.toString().padStart(2,'0')) && String(a.styId) === String(s.id));
                row.innerHTML = `<div class="time-label">${h}:00</div>`;
                if(matched.length) {
                    row.innerHTML += matched.map(a => `
                        <div class="apt-card ${a.done?'completed':''}" style="--c:${s.color};">
                            <div class="tag-group">
                                <span class="tag-pill ${a.payTags?.includes('L')?'active-L':''}" onclick="event.stopPropagation(); togglePay('${a.id}','L','${ds}')"><i class="fab fa-line"></i></span>
                                <span class="tag-pill ${a.payTags?.includes('J')?'active-J':''}" onclick="event.stopPropagation(); togglePay('${a.id}','J','${ds}')"><i class="fas fa-wallet"></i></span>
                                <span class="tag-pill ${a.payTags?.includes('C')?'active-C':''}" onclick="event.stopPropagation(); togglePay('${a.id}','C','${ds}')"><i class="fas fa-coins"></i></span>
                                <span class="tag-pill ${a.isVIP?'active-VIP':''}" onclick="event.stopPropagation(); toggleVIP('${a.id}','${ds}')"><i class="fas fa-star"></i></span>
                            </div>
                            <div style="font-weight:900; color:var(--gold); font-size:0.9rem;">${a.time}</div>
                            <div style="font-weight:900; font-size:1.6rem; margin:4px 0;">${a.n || a.name}</div>
                            <div onclick="event.stopPropagation(); popNoteEdit('${a.id}', '${ds}')" style="background:#f4f4f7; padding:12px; border-radius:18px; margin-top:8px; font-size:0.85rem; color:#444; min-height:40px;">
                                <div style="font-weight:900; color:var(--gold); margin-bottom:4px;">✂️ ${(a.tags || []).join('+') || '一般服務'}</div>
                                ${a.note_full || "點擊輸入備註..."}
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:10px; border-top:0.5px solid #eee;">
                                <div style="font-weight:800; color:#aeaeb2; font-size:0.85rem;"><i class="fas fa-phone"></i> ${a.p||"未留"}</div>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <i class="fas fa-edit" style="color:#c7c7cc;" onclick="event.stopPropagation(); popBooking('${a.n}','${a.p}','${a.styId}','${a.id}')"></i>
                                    <i class="fas fa-check-circle" style="color:${a.done?'#34c759':'#e5e5ea'}; font-size:1.8rem;" onclick="event.stopPropagation(); toggleAptDone('${a.id}','${ds}')"></i>
                                </div>
                            </div>
                        </div>`).join('');
                }
                lane.appendChild(row);
            }
            area.appendChild(lane);
        });
    }

    // --- 顧客渲染 ---
    function renderCli() {
        const area = document.getElementById('cli-list');
        const f = document.getElementById('cli-f-sty').value;
        area.innerHTML = store.clients.filter(c => ((c.n||"").includes(cliKw) || (c.p||"").includes(cliKw)) && (!f || String(c.lastSty) === String(f)))
            .map(c => {
                const sty = store.stylists.find(s => String(s.id) === String(c.lastSty));
                return `<div class="apt-card" style="--c:${sty?.color||'#eee'}; max-width:100%;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><div style="font-weight:900; font-size:1.6rem;">${c.n}</div><div style="color:#aeaeb2; font-size:0.9rem; font-weight:700;">📞 ${c.p||"未設"}</div></div>
                        <div style="background:${sty?.color||'#eee'}; color:#fff; padding:6px 12px; border-radius:12px; font-size:0.8rem; font-weight:900;">${sty?.name || "無"}</div>
                    </div>
                    <div style="display:flex; justify-content:flex-end; gap:20px; margin-top:15px; border-top:0.5px solid #eee; padding-top:10px;">
                        <i class="fas fa-edit" style="color:#c7c7cc;" onclick="editCli('${c.n}')"></i>
                        <i class="fas fa-trash" style="color:rgba(255,59,48,0.2);" onclick="confirmDelCli('${c.n}')"></i>
                    </div>
                </div>`;
            }).join('');
    }

    // --- 設定渲染 ---
    function renderSet() {
        document.getElementById('set-content-container').innerHTML = `
            <div style="margin-bottom:40px;"><p style="font-weight:900; color:#8e8e93;">0. 營業時間</p><div style="display:flex; gap:15px;"><input type="time" class="luxe-btn" style="flex:1;" value="${store.startH}" onchange="store.startH=this.value;saveS();">至<input type="time" class="luxe-btn" style="flex:1;" value="${store.endH}" onchange="store.endH=this.value;saveS();"></div></div>
            <div style="margin-bottom:40px;"><p style="font-weight:900; color:#8e8e93;">1. 休假設定</p><div class="luxe-btn" style="width:100%;" onclick="pickOffMulti()">選擇月份日期</div></div>
            <div style="margin-bottom:40px;"><p style="font-weight:900; color:#8e8e93;">2. 人員管理</p>${store.stylists.map(s => `<div class="luxe-btn" style="width:100%; margin-bottom:10px; justify-content:space-between;"><div><span style="color:${s.color}">●</span> ${s.name}</div><i class="fas fa-times" style="color:#ff3b30;" onclick="confirmDelSty(${s.id})"></i></div>`).join('')}<div class="luxe-btn" style="width:100%; border:1px dashed var(--gold); background:none;" onclick="addStyTrig()">+ 新增人員</div></div>
            <div style="margin-bottom:40px;"><p style="font-weight:900; color:#8e8e93;">3. 數據同步</p><div class="luxe-btn" style="width:100%; background:rgba(212,175,55,0.1);" onclick="pullFromGSheet(true)">強制雲端同步</div><div style="display:flex; gap:15px; margin-top:15px;"><div class="luxe-btn" style="flex:1;" onclick="exportToFile()">下載存檔</div><div class="luxe-btn" style="flex:1;" onclick="triggerLoad()">讀取存檔</div></div></div>
        `;
    }

    // --- 功能邏輯組 (不閹割) ---
    async function popBooking(n="", p="", sId=null, editId=null) {
        const apt = editId ? store.appointments.find(a => String(a.id) === String(editId)) : null;
        tempTags = apt ? [...(apt.tags || [])] : [];
        const { value: res } = await Swal.fire({
            title: editId ? '修改預約' : '新增預約', width: '90%',
            html: `<input id="pop-n" class="luxe-btn" style="width:100%; margin-bottom:12px;" value="${n}" placeholder="姓名"><input id="pop-p" class="luxe-btn" style="width:100%; margin-bottom:12px;" value="${p}" placeholder="電話"><select id="pop-s" class="luxe-btn" style="width:100%; margin-bottom:12px;">${store.stylists.map(s=>`<option value="${s.id}" ${String(s.id)===String(sId||1)?'selected':''}>${s.name}</option>`).join('')}</select><textarea id="pop-note" class="luxe-btn" style="width:100%; height:80px; margin-bottom:12px;" placeholder="備註...">${apt?apt.note_full||"":""}</textarea><div style="display:flex; gap:10px;"><input id="pop-d" class="luxe-btn" type="date" value="${apt?apt.date:curD.toLocaleDateString('sv')}" style="flex:1;"><input id="pop-t" class="luxe-btn" type="time" value="${apt?apt.time:'12:00'}" style="flex:1;"></div><div style="margin-top:15px;"><input type="checkbox" id="pop-save-cli" checked> 同步至顧客名冊</div>`,
            preConfirm: () => ({ n: document.getElementById('pop-n').value, p: document.getElementById('pop-p').value, styId: document.getElementById('pop-s').value, note: document.getElementById('pop-note').value, d: document.getElementById('pop-d').value, t: document.getElementById('pop-t').value, saveCli: document.getElementById('pop-save-cli').checked })
        });
        if (res && res.n) {
            const data = { id: editId || String(Date.now()), n: res.n, p: res.p, styId: res.styId, note_full: res.note, date: res.d, time: res.t, tags: [...tempTags], done: apt?apt.done:false, payTags: apt?apt.payTags:[], isVIP: apt?apt.isVIP:false };
            if (editId) store.appointments = store.appointments.map(a => String(a.id) === String(editId) ? data : a);
            else { store.appointments.push(data); if(res.saveCli && !store.clients.find(c => c.n === res.n)) store.clients.push({ n: res.n, p: res.p, lastSty: res.styId }); }
            saveS(); refreshUI();
        }
    }

    function togglePay(id, code, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); if(!a.payTags) a.payTags = []; const i = a.payTags.indexOf(code); if(i > -1) a.payTags.splice(i, 1); else a.payTags.push(code); saveS(); renderDay(ds); }
    function toggleVIP(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); a.isVIP = !a.isVIP; saveS(); renderDay(ds); }
    function toggleAptDone(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); a.done = !a.done; saveS(); renderDay(ds); }
    async function popNoteEdit(id, ds) { const a = store.appointments.find(x => String(x.id) === String(id)); const {value:t} = await Swal.fire({title:'備註', input:'textarea', inputValue:a.note_full||""}); if(t!==undefined){a.note_full=t; saveS(); renderDay(ds);} }
    function confirmDelApt(id, ds) { Swal.fire({title:'刪除預約？', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.appointments=store.appointments.filter(a=>String(a.id)!==String(id));saveS();renderDay(ds);}}); }
    function confirmDelCli(n) { Swal.fire({title:'刪除顧客？', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.clients=store.clients.filter(c=>c.n!==n);saveS();renderCli();}}); }
    function confirmDelSty(id) { Swal.fire({title:'移除人員？', showCancelButton:true}).then(r=>{if(r.isConfirmed){store.stylists=store.stylists.filter(s=>s.id!==id);saveS();renderSet();}}); }
    function exportToFile() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(store)],{type:'application/json'})); a.download=`backup.json`; a.click(); }
    function triggerLoad() { const i = document.createElement('input'); i.type = 'file'; i.onchange = e => { const r = new FileReader(); r.onload = () => { store = JSON.parse(r.result); saveS(); location.reload(); }; r.readAsText(e.target.files[0]); }; i.click(); }

    function initMonth() {
        const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
        const pick = document.getElementById('m-picker').value ? new Date(document.getElementById('m-picker').value + "-01") : new Date();
        const year = pick.getFullYear(), month = pick.getMonth(), today = new Date().toLocaleDateString('sv');
        const days = new Date(year, month + 1, 0).getDate();
        let sDay = new Date(year, month, 1).getDay(); sDay = sDay === 0 ? 6 : sDay - 1;
        for(let i=0; i<sDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; 
            const el = document.createElement('div'); el.className = 'cal-day';
            if(ds === today) el.classList.add('today-highlight');
            if(store.offDays.includes(ds)) el.style.background = store.offColor;
            const hasApt = store.appointments.some(a => a.date === ds);
            el.innerHTML = `<div>${d}</div>${hasApt ? '<div style="width:8px;height:8px;background:var(--gold);border-radius:50%;margin:5px auto;"></div>':''}`;
            el.onclick = () => { curD = new Date(ds); showP('pg-day'); }; grid.appendChild(el);
        }
    }

    const fillStySelect = () => { document.getElementById('cli-f-sty').innerHTML = '<option value="">所有人</option>' + store.stylists.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); };
    window.onload = () => { document.getElementById('m-picker').value = new Date().toISOString().slice(0,7); pullFromGSheet(); refreshUI(); };
</script>
</body>
</html>
